name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [arm64, x86_64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ${{ matrix.arch }}
        run: |
          set -euo pipefail
          APP_BUNDLE=$(Scripts/build-app.sh release ${{ matrix.arch }} 2>/dev/stderr)
          ditto -c -k --sequesterRsrc --keepParent "$APP_BUNDLE" "ClipboardManager-${{ matrix.arch }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClipboardManager-${{ matrix.arch }}
          path: ClipboardManager-${{ matrix.arch }}.zip

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ClipboardManager-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ClipboardManager-*.zip
          generate_release_notes: true
